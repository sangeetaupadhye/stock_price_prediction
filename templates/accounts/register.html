{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <h2>Create Account</h2>
        <p>Start using AI-based stock prediction</p>

        <!--  ERROR MESSAGE -->
        {% if error %}
        <div style="background:#fde8e8; color:#e74c3c; padding:10px 14px; border-radius:8px; margin-bottom:16px; font-size:14px;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>

        <p class="link-text">
            Already have an account? <a href="/login/">Login</a>
        </p>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="slider">
            <img src="{% static 'images/stock1.jpeg' %}" class="slide active">
            <img src="{% static 'images/stock2.jpeg' %}" class="slide">
            <img src="{% static 'images/stock3.jpeg' %}" class="slide">
        </div>

        <div class="overlay">
            <h3>
                Make smarter investments<br>
                using predictive analytics
            </h3>
        </div>
    </div>

</div>

<script>
let index = 0;
const slides = document.querySelectorAll(".slide");

setInterval(() => {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}, 3000);
</script>

</body>
</html>
